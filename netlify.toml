[build]
  command = "pnpm build"
  publish = ".next"

# Основной редирект для Next.js App Router
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/next"
  status = 200

# Дополнительные редиректы для важных путей
[[redirects]]
  from = "/cars/*"
  to = "/.netlify/functions/next"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/next"
  status = 200

[[redirects]]
  from = "/howitworks"
  to = "/.netlify/functions/next"
  status = 200

[functions]
  node_bundler = "esbuild"