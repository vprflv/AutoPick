[build]
  command = "pnpm build"
  publish = ".next"

# Основной редирект для Next.js 15/16 App Router
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/next"
  status = 200

# Дополнительно для динамических маршрутов
[[redirects]]
  from = "/cars/*"
  to = "/.netlify/functions/next"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/.netlify/functions/next"
  status = 200

[functions]
  node_bundler = "esbuild"
  directory = ".netlify/functions"