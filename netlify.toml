[build]
  command = "pnpm build"
  publish = ".next"

# Важно для Next.js App Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Дополнительно для API routes и Server Actions
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

[functions]
  node_bundler = "esbuild"