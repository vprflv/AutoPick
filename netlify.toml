[build]
  command = "pnpm build"
  publish = ".next"

# Правильный редирект для Next.js App Router
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/__next_data"
  status = 200

# Альтернативный (более надёжный) вариант — через серверless функцию
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/next"
  status = 200

[functions]
  node_bundler = "esbuild"